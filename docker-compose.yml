version: "3.8"

services:
  busybox:
    image: busybox:1.37.0
    container_name: fuseki-data
    networks:
      - cig_handler
    volumes:
      - drug_volume:/fuseki
    restart: unless-stopped

  store_app:
    image: stain/jena-fuseki:5.1.0
    container_name: store_service
    restart: unless-stopped
    ports:
      - "3030:3030"
    networks:
      - cig_handler
    environment:
      - ADMIN_PASSWORD=road2h
      - TDB=2
      - FUSEKI_DATASET_1=careActions
      - FUSEKI_DATASET_2=transitions
      - FUSEKI_DATASET_3=beliefs
      - FUSEKI_DATASET_4=statements
      - JVM_ARGS=-Xmx2g
    depends_on:
      busybox:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/$/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  interaction_app:
    build:
      context: ./api/
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
        SKIP_COPY: true
    image: road2h-interaction_ms:latest
    container_name: interaction_service
    restart: unless-stopped
    ports:
      - "8888:8888"
      - "9229:9229"
    command: ["npx", "nodemon", "--inspect=0.0.0.0:9229", "./bin/www"]
    networks:
      - cig_handler
    volumes:
      - ./api/:/usr/src/app/
      - ./api/package.json:/usr/src/app/package.json
      - ./api/package-lock.json:/usr/src/app/package-lock.json
      - /usr/src/app/node_modules/
    environment:
      - NODE_ENV=development
      - JENA_HOST=store_service
      - PROLOG_HOST=reasoner_service
      - JENA_PORT=3030
      - PROLOG_PORT=1234
      - PORT=8888
      - FUSEKI_PASSWORD=road2h
    depends_on:
      reasoner_app:
        condition: service_healthy

  reasoner_app:
    build:
      context: ./backend/
      dockerfile: Dockerfile
    image: road2h-reasoner_ms:latest
    container_name: reasoner_service
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "1234:1234"
    networks:
      - cig_handler
    environment:
      - FUSEKI_HOST_PORT=http://store_service:3030/
    depends_on:
      store_app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://store_service:3030/$/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  drug_volume:
    driver: local

networks:
  cig_handler:
    driver: bridge
