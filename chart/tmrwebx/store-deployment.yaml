apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: drug-volume-claim
spec:
  storageClassName: hostpath
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-app
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: store-app
  template:
    metadata:
      labels:
        app: store-app
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: store-app
          image: stain/jena-fuseki:5.1.0
          env:
            - name: ADMIN_PASSWORD
              value: "road2h"
            - name: JVM_ARGS
              value: "-Xmx2g"
          ports:
            - containerPort: 3030
          volumeMounts:
            - mountPath: /fuseki
              name: drug-volume
          resources:
            limits:
              cpu: "1"
              memory: "2Gi"
            requests:
              cpu: "500m"
              memory: "1Gi"
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 10
      dnsPolicy: ClusterFirst
      volumes:
        - name: drug-volume
          persistentVolumeClaim:
            claimName: drug-volume-claim